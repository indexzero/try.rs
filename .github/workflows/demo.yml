name: Demo

# Render demo.tape with vhs (charmbracelet/vhs-action@v2.1.0, verified
# 2026-07-10). Runs on demand or when the tape changes; uploads the gif as
# an artifact for review — committing it back is a human decision.

on:
  workflow_dispatch:
  pull_request:
    paths: [demo.tape]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Build release binary
        run: cargo build --release --locked
      - name: Render demo.tape
        uses: charmbracelet/vhs-action@v2.1.0
        with:
          path: demo.tape
      - uses: actions/upload-artifact@v4
        with:
          name: demo-gif
          path: demo.gif
