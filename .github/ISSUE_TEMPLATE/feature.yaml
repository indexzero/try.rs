name: Feature request
description: Propose a capability that is not specific to only the TUI or CLI.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the underlying workflow before prescribing an implementation. For terminal interactions or command syntax, prefer the dedicated TUI or CLI form.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Existing issues
      options:
        - label: I searched the existing issues for this feature.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need is not addressed today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior and the intended user experience.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or different designs have you considered?

  - type: textarea
    id: scope
    attributes:
      label: Scope and compatibility
      description: Note effects on existing workflows, upstream conformance, platforms, or configuration.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, prior art, mockups, or implementation ideas.
