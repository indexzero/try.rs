name: Bug report
description: Report behavior that is incorrect, unexpected, or regressed.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. A small, reproducible sequence and the emitted output are the fastest route to a fix.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Existing issues
      options:
        - label: I searched the existing issues for this bug.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: Briefly describe what is wrong and its impact.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure ...
        2. Run `try ...`
        3. Press ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste terminal output, emitted shell code, or logs. Remove secrets first.
      render: shell

  - type: input
    id: version
    attributes:
      label: try version
      placeholder: try v0.1.0
    validations:
      required: true

  - type: input
    id: installation
    attributes:
      label: Installation method
      placeholder: Homebrew, cargo binstall, cargo install, Nix, source build

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.5, Ubuntu 24.04, Windows 11
    validations:
      required: true

  - type: dropdown
    id: shell
    attributes:
      label: Shell
      options:
        - zsh
        - bash
        - fish
        - PowerShell
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add configuration, repository layout, regressions, screenshots, or recordings.
