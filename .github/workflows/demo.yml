name: Demo

# Render demo.tape with vhs. charmbracelet/vhs-action is NOT used: it
# unconditionally downloads ffmpeg assets pinned to "ffmpeg-n5.1*" from
# BtbN/FFmpeg-Builds' latest release, which no longer carries them — the
# action fails on every run (verified 2026-07-11 against its
# src/dependencies.ts). Plain installs instead.

on:
  workflow_dispatch:
  pull_request:
    paths: [demo.tape]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Build release binary
        run: cargo build --release --locked
      - name: Install vhs dependencies (ffmpeg, ttyd)
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg ttyd
      - name: Install vhs (pinned)
        run: go install github.com/charmbracelet/vhs@v0.11.0
      - name: Render demo.tape
        run: ~/go/bin/vhs demo.tape
      - uses: actions/upload-artifact@v4
        with:
          name: demo-gif
          path: demo.gif
